<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 4</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .battery {
            width: 100px;
            height: 50px;
            margin: 50px auto 0;
            border: 3px solid black;
            position: relative;
        }

        .battery::after {
            content: "";
            position: absolute;
            background: black;
            right: -7px;
            width: 5px;
            height: 20px;
            top: 12px;
        }

        .battery::before {
            content: "";
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
        }

        .red::before {
            width: 30%;
            background: red;
        }

        .yellow::before {
            width: 60%;
            background: yellow;
        }

        .green::before {
            width: 100%;
            background: green;
        }
        a {
            color: #2980b9;
            text-decoration: none;
            font-weight: bold;
            margin-top: 50px;
            margin-left: 50px;
            display: block;
            font-size: 20px;
        }
    </style>
</head>

<body>
    <div class="battery red"></div>
    <div class="battery yellow"></div>
    <div class="battery green"></div>
    <a href="Task5.html">Перейти до п'ятого завдання</a>
</body>

</html>
