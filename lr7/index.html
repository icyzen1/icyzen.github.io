<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lr7</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <div class="container">
        <h1>Обов'язково додайте своє замовлення</h1>
        <div class="wrap">
            <div class="product-card">
                <div class="badge new">Новинка</div>
                <h3 class = "category">Новий ЖК</h3>
                <div class="swipe left"><</div>
                <div class="img-container">
                    <img src="images/green-quarter.jpg" alt="">
                </div>
                <a href="https://vn.com.ua/ua/complex/zhk-zelenyy-kvartal" class = "link">ЖК "Зелений квартал"</a>
                <button class = "btn soon">Незабаром у продажі</button>
            </div>
            <div class="product-card">
                <h3 class = "category">Котедж</h3>
                <div class="img-container">
                    <img src="images/cottage.jpg" alt="">
                </div>
                <a href="https://proektcottage.com.ua/uk/tag/typovyj-proekt-budynku-kotedzhu/" class = "link">Таунхаус "Garden City"</a>
                <div class="price">
                    <span class = "old-price">$124,999</span>
                    <span>$90,000</span>
                </div>
                <button class = "btn">Купити</button>
            </div>
            <div class="product-card">
                <div class="badge">Хіт продажів</div>
                <h3 class = "category">Оренда • Офіс</h3>
                <div class="img-container">
                    <img src="images/rent-office.jpg" alt="">
                </div>
                <a href="https://peremoga.space/en/chto-takoe-ofys-formata-open-space-peremoga-space/" class = "link">БЦ "Скайлайн"</a>
                <div class="price">
                    <span>$1,500</span>
                </div>
                <button class = "btn">Орендувати</button>
            </div>
            <div class="product-card">
                <div class="badge">Хіт продажів</div>
                <h3 class = "category">Будується</h3>
                <div class="swipe right">></div>
                <div class="img-container">
                    <img src="images/apartment.jpg" alt="">
                </div>
                <a href="https://volynonline.com/kvartyra-studiya-shho-cze-take-yaki-perevagy-ta-nedoliky-takoyi-neruhomosti/" class = "link">Квартира • Студія</a>
                <div class="price">
                    <span>$45,000</span>
                </div>
                <button class = "btn">Забронювати</button>
            </div>
        </div>
    </div>
</body>
</html>
