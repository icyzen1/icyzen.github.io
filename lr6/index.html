<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lr6</title>
    <link rel="stylesheet" href="styles/style.css">
</head>

<body>
    <div class="fullwrap">
        <div class="header"></div>
        <div class="wrap">
            <div class="main"></div>
            <div class="sidebar"></div>
        </div>
        <div class="footer"></div>
    </div>


    <div class="calc">
        <div class="header-calc">Casio 3234</div>
        <div class="display-container"><input type="text" value="лоррпапр" class="display"></div>
        <div class="green-block"></div>
        <div class="buttons">
            <button>7</button>
            <button>8</button>
            <button>9</button>
            <button>+</button>
            <button>4</button>
            <button>5</button>
            <button>6</button>
            <button>-</button>
            <button>1</button>
            <button>2</button>
            <button>3</button>
            <button>/</button>
            <button>,</button>
            <button>0</button>
            <button>=</button>
            <button>*</button>
        </div>
    </div>

    <div class="calc-position">
        <div class="header-calc">Casio 3234</div>
        <div class="display-container"><input type="text" value="лоррпапр" class="display"></div>
        <div class="green-block-position"></div>
        <div class="buttons">
            <button style="top: 150px; left: 10px;" class="button_position">7</button>
            <button style="top: 150px; left: 68px;" class="button_position">8</button>
            <button style="top: 150px; left: 127px;" class="button_position">9</button>
            <button style="top: 150px; left: 187px;" class="button_position">+</button>
            <button style="top: 205px; left: 10px;" class="button_position">4</button>
            <button style="top: 205px; left: 68px;" class="button_position">5</button>
            <button style="top: 205px; left: 127px;" class="button_position">6</button>
            <button style="top: 205px; left: 187px;" class="button_position">-</button>
            <button style="top: 260px; left: 10px;" class="button_position">1</button>
            <button style="top: 260px; left: 68px;" class="button_position">2</button>
            <button style="top: 260px; left: 127px;" class="button_position">3</button>
            <button style="top: 260px; left: 187px;" class="button_position">/</button>
            <button style="top: 315px; left: 10px;" class="button_position">,</button>
            <button style="top: 315px; left: 68px;" class="button_position">0</button>
            <button style="top: 315px; left: 127px;" class="button_position">=</button>
            <button style="top: 315px; left: 187px;" class="button_position">*</button>
        </div>
    </div>

<div class="container">
    <div class="menu-card">
        <div class="photo-box">
            <img src="images/images.png" alt="Burger">
            <div class="black-label">
                <h2>БУРГЕР-ITALIAN !</h2>
                <span class = "yellow">УСЬОГО</span><span> 79 ГРН</span>
            </div>
        </div>

        <div class="content-box">
            <p class = "m">Лови момент!</p>
            
            <div class="menu-list">
                <div class="item">
                    <h3>MICHIGAN</h3>
                    <p>64.00 ГРН</p>
                </div>
                <div class="item">
                    <h3>Beef BBQ</h3>
                    <p>59.00 ГРН</p>
                </div>
                <div class="item">
                    <h3>Cheeseburger</h3>
                    <p>59.00 ГРН</p>
                </div>
                <div class="item">
                    <h3>KETCHUP ROOM</h3>
                    <p>68.00 ГРН</p>
                </div>
                <div class="item">
                    <h3>KETCHUP ROOM 2</h3>
                    <p>72.00 ГРН</p>
                </div>
                <div class="item">
                    <h3>ELVIS</h3>
                    <p>55.00 ГРН</p>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-btn">
        <a href="#">ВСЕ МЕНЮ</a>
    </div>
</div>
</body>

</html>
